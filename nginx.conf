server {
    listen 80;
    server_name _;

    # Arxius estàtics (HTML, CSS, JS, imatges)
    root /usr/share/nginx/html;
    index index.html;

    # Servir la web (SPA: qualsevol ruta torna a index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de l'API al backend Python (server.py)
    # Canvia "backend:8080" si el teu backend corre en un altre lloc/port
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Timeout generós per a la lectura de sensors
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # No fer log de peticions a l'API (s'ompliria de soroll)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
