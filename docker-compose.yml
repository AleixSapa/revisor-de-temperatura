version: "3.8"

services:
  # Frontend: nginx serveix els arxius estàtics i fa proxy de /api/* al backend
  web:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  # Backend: Python llegeix els sensors de maquinari i serveix l'API
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    # Per llegir els sensors de temperatura del host (Linux), cal muntar /sys/class/thermal
      - /sys/class/thermal:/sys/class/thermal:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro
    # El backend corre al port 8080 (nginx li fa proxy des del port 80)
    command: python3 server.py --port 8080
    restart: unless-stopped
